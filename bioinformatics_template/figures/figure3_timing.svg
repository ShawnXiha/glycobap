<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="white"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Figure 3: Processing Time Comparison</text>
  
  <!-- Y-axis (log scale representation) -->
  <line x1="100" y1="80" x2="100" y2="400" stroke="black" stroke-width="2"/>
  <text x="30" y="250" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" transform="rotate(-90, 30, 250)">Processing Time (seconds, log scale)</text>
  
  <!-- Y-axis ticks and labels -->
  <line x1="95" y1="120" x2="100" y2="120" stroke="black" stroke-width="1"/>
  <text x="85" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="end">3600</text>
  
  <line x1="95" y1="180" x2="100" y2="180" stroke="black" stroke-width="1"/>
  <text x="85" y="185" font-family="Arial, sans-serif" font-size="12" text-anchor="end">600</text>
  
  <line x1="95" y1="240" x2="100" y2="240" stroke="black" stroke-width="1"/>
  <text x="85" y="245" font-family="Arial, sans-serif" font-size="12" text-anchor="end">60</text>
  
  <line x1="95" y1="300" x2="100" y2="300" stroke="black" stroke-width="1"/>
  <text x="85" y="305" font-family="Arial, sans-serif" font-size="12" text-anchor="end">6</text>
  
  <line x1="95" y1="360" x2="100" y2="360" stroke="black" stroke-width="1"/>
  <text x="85" y="365" font-family="Arial, sans-serif" font-size="12" text-anchor="end">0.6</text>
  
  <line x1="95" y1="400" x2="100" y2="400" stroke="black" stroke-width="1"/>
  <text x="85" y="405" font-family="Arial, sans-serif" font-size="12" text-anchor="end">0.1</text>
  
  <!-- X-axis -->
  <line x1="100" y1="400" x2="700" y2="400" stroke="black" stroke-width="2"/>
  
  <!-- Bars -->
  <!-- GlycoSMILES2BAP: 0.82s - near bottom -->
  <rect x="150" y="380" width="100" height="20" fill="#2563eb" stroke="#1e40af" stroke-width="1"/>
  <text x="200" y="375" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">0.82s</text>
  <text x="200" y="430" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">GlycoSMILES2BAP</text>
  
  <!-- Manual BAP: 2700s (45 min) - full height -->
  <rect x="350" y="120" width="100" height="280" fill="#ef4444" stroke="#b91c1c" stroke-width="1"/>
  <text x="400" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">2700s</text>
  <text x="400" y="430" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Manual BAP</text>
  <text x="400" y="445" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">(45 min avg)</text>
  
  <!-- Speedup indicator -->
  <path d="M 250 350 L 350 350" stroke="#059669" stroke-width="3" marker-end="url