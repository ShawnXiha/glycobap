<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlycoSMILES2BAP Presentation - English Version</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #eee; }
        .slide { 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding: 60px 80px;
            border-bottom: 1px solid #333;
        }
        .slide-title { 
            font-size: 3em; 
            margin-bottom: 40px; 
            color: #00d9ff;
            border-left: 8px solid #00d9ff;
            padding-left: 20px;
        }
        .slide-content { font-size: 1.5em; line-height: 1.8; }
        .highlight { color: #ff6b6b; font-weight: bold; }
        .key-point { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 30px; 
            border-radius: 10px; 
            margin: 20px 0;
            font-size: 1.2em;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin: 30px 0;
        }
        .metric-box {
            background: #2d2d44;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #00d9ff;
        }
        .metric-value { font-size: 3em; color: #00d9ff; font-weight: bold; }
        .metric-label { font-size: 1.2em; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 0.9em; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #444; }
        th { background: #2d2d44; color: #00d9ff; }
        .pipeline-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        .pipeline-step {
            background: #2d2d44;
            padding: 20px 30px;
            border-radius: 10px;
            text-align: center;
            min-width: 180px;
        }
        .pipeline-arrow { font-size: 2em; color: #00d9ff; }
        ul { margin-left: 40px; margin-top: 20px; }
        li { margin: 15px 0; }
        .title-slide { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .author-info { font-size: 1.3em; margin-top: 30px; color: #888; }
        .conclusion-box {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
        }
        .slide-number {
            position: fixed;
            bottom: 20px;
            right: 40px;
            font-size: 1em;
            color: #666;
        }
        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        .figure-placeholder {
            background: #2d2d44;
            border: 2px dashed #00d9ff;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
