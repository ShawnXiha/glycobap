<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <title>Expanded Benchmark Performance Comparison</title>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">GlycoSMILES2BAP Performance: Original (n=50) vs Expanded (n=1000) Benchmark</text>
  
  <!-- Axes -->
  <line x1="100" y1="400" x2="700" y2="400" stroke="#333" stroke-width="2"/>
  <line x1="100" y1="400" x2="100" y2="80" stroke="#333" stroke-width="2"/>
  
  <!-- Y-axis labels -->
  <text x="50" y="240" font-family="Arial" font-size="14" text-anchor="middle" transform="rotate(-90,50,240)">Accuracy (%)</text>
  <text x="90" y="400" font-family="Arial" font-size="12" text-anchor="end">60</text>
  <text x="90" y="320" font-family="Arial" font-size="12" text-anchor="end">70</text>
  <text x="90" y="240" font-family="Arial" font-size="12" text-anchor="end">80</text>
  <text x="90" y="160" font-family="Arial" font-size="12" text-anchor="end">90</text>
  <text x="90" y="80" font-family="Arial" font-size="12" text-anchor="end">100</text>
  
  <!-- Grid lines -->
  <line x1="100" y1="320" x2="700" y2="320" stroke="#ddd" stroke-width="1"/>
  <line x1="100" y1="240" x2="700" y2="240" stroke="#ddd" stroke-width="1"/>
  <line x1="100" y1="160" x2="700" y2="160" stroke="#ddd" stroke-width="1"/>
  
  <!-- Legend -->
  <rect x="550" y="60" width="15" height="15" fill="#4472C4"/>
  <text x="570" y="72" font-family="Arial" font-size="12">Original (n=50)</text>
  <rect x="550" y="82" width="15" height="15" fill="#ED7D31"/>
  <text x="570" y="94" font-family="Arial" font-size="12">Expanded (n=1000)</text>
  
  <!-- Epimer Accuracy -->
  <rect x="150" y="93" width="40" height="307" fill="#4472C4" opacity="0.8"/>
  <rect x="200" y="108" width="40" height="292" fill="#ED7D31" opacity="0.8"/>
  <text x="195" y="420" font-family="Arial" font-size="12" text-anchor="middle">Epimer</text>
  <text x="170" y="85" font-family="Arial" font-size="10" text-anchor="middle">98.5%</text>
  <text x="220" y="100" font-family="Arial" font-size="10" text-anchor="middle">97.8%</text>
  
  <!-- Anomeric Accuracy -->
  <rect x="300" y="107" width="40" height="293" fill="#4472C4" opacity="0.8"/>
  <rect x="350" y="128" width="40" height="272" fill="#ED7D31" opacity="0.8"/>
  <text x="345" y="420" font-family="Arial" font-size="12" text-anchor="middle">Anomeric</text>
  <text x="320" y="99" font-family="Arial" font-size="10" text-anchor="middle">98.2%</text>
  <text x="370" y="120" font-family="Arial" font-size="10" text-anchor="middle">97.4%</text>
  
  <!-- Linkage Accuracy -->
  <rect x="450" y="139" width="40" height="261" fill="#4472C4" opacity="0.8"/>
  <rect x="500